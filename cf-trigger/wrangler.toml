name = "anyrouter-checkin-trigger"
main = "src/index.js"
compatibility_date = "2026-06-14"

# 显式声明，消除部署告警并主动收敛暴露面
workers_dev = true     # 保留 *.workers.dev 上的手动测试入口（?key= 触发）
preview_urls = false   # 不需要 preview 部署的 URL，关闭

# Cloudflare Cron Trigger（UTC）。30 0 * * * → 每天 UTC 00:30 = 北京 08:30
[triggers]
crons = ["30 0 * * *"]
